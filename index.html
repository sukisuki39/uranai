<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デイリー星占い | 今日の星があなたに語りかける</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1218;
  --ink-mid: #3d2e38;
  --ink-soft: #7a6070;
  --ink-pale: #b09aa8;
  --petal: #d4a0b5;
  --petal-light: #ecdde5;
  --gold: #b8934a;
  --gold-light: #dfc898;
  --gold-pale: #f7f0e3;
  --cream: #fdf8f5;
  --white: #ffffff;
  --border: #e8d8e0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-weight:300;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(212,160,181,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 70% at 90% 80%,rgba(184,147,74,.08) 0%,transparent 60%);pointer-events:none;z-index:0;}
.page{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 24px 80px;}
.header{padding:60px 0 48px;text-align:center;border-bottom:1px solid var(--border);margin-bottom:48px;}
.header-eyebrow{font-size:10px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:14px;}
.header-eyebrow::before,.header-eyebrow::after{content:'';width:32px;height:1px;background:var(--gold-light);}
.header-title{font-family:'Shippori Mincho B1',serif;font-size:clamp(28px,7vw,44px);font-weight:800;color:var(--ink);line-height:1.25;letter-spacing:.06em;margin-bottom:16px;}
.header-title em{font-style:normal;color:var(--petal);}
.header-desc{font-size:12px;color:var(--ink-soft);letter-spacing:.1em;line-height:2.2;}
.form-section{margin-bottom:32px;}
.form-label-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.form-label{font-family:'Shippori Mincho B1',serif;font-size:13px;color:var(--ink-mid);letter-spacing:.08em;}
.form-label-sub{font-size:10px;color:var(--ink-pale);letter-spacing:.05em;}
.form-input{width:100%;padding:16px 20px;background:var(--white);border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:300;color:var(--ink);outline:none;transition:border-color .25s,box-shadow .25s;-webkit-appearance:none;appearance:none;}
.form-input:focus{border-color:var(--petal);box-shadow:0 0 0 3px rgba(212,160,181,.15);}
.form-input::placeholder{color:var(--ink-pale);}
.form-note{font-size:10px;color:var(--ink-pale);margin-top:6px;letter-spacing:.05em;line-height:1.8;}
.cta-wrap{margin:40px 0;}
.cta-btn{width:100%;padding:20px;background:var(--ink);color:var(--cream);border:none;border-radius:4px;font-family:'Shippori Mincho B1',serif;font-size:15px;font-weight:600;letter-spacing:.22em;cursor:pointer;transition:background .3s;}
.cta-btn:hover{background:var(--ink-mid);}
.cta-btn:active{transform:scale(.995);}
.cta-btn:disabled{background:var(--ink-pale);cursor:not-allowed;}
.loading{display:none;padding:60px 0;text-align:center;}
.loading-symbol{font-size:36px;display:block;margin-bottom:20px;animation:slowSpin 8s linear infinite;}
@keyframes slowSpin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Shippori Mincho B1',serif;font-size:13px;color:var(--ink-soft);letter-spacing:.2em;}
.result{display:none;animation:revealUp .8s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes revealUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.result-header{text-align:center;padding:40px 24px 36px;background:var(--white);border:1px solid var(--border);margin-bottom:2px;}
.result-date{font-size:10px;letter-spacing:.3em;color:var(--gold);margin-bottom:16px;}
.result-sign-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;}
.result-sign-symbol{font-size:28px;line-height:1;}
.result-sign-name{font-family:'Shippori Mincho B1',serif;font-size:18px;color:var(--ink-mid);letter-spacing:.08em;}
.result-person{font-family:'Shippori Mincho B1',serif;font-size:22px;color:var(--ink);font-weight:800;letter-spacing:.05em;}
.catchcopy-block{background:var(--ink);color:var(--cream);padding:32px 28px;margin-bottom:2px;text-align:center;}
.catchcopy-label{font-size:9px;letter-spacing:.35em;color:var(--gold-light);margin-bottom:14px;text-transform:uppercase;}
.catchcopy-text{font-family:'Shippori Mincho B1',serif;font-size:clamp(18px,5vw,26px);font-weight:800;line-height:1.5;letter-spacing:.08em;color:var(--white);}
.fortune-block{background:var(--white);border:1px solid var(--border);border-top:none;padding:32px 28px;margin-bottom:2px;}
.fortune-label{font-size:9px;letter-spacing:.35em;color:var(--petal);margin-bottom:16px;text-transform:uppercase;}
.fortune-text{font-size:14px;line-height:2.4;color:var(--ink-mid);font-weight:300;}
.action-block{background:var(--gold-pale);border:1px solid var(--gold-light);border-top:none;padding:28px 28px;margin-bottom:32px;}
.action-label{font-size:9px;letter-spacing:.35em;color:var(--gold);margin-bottom:12px;text-transform:uppercase;}
.action-text{font-family:'Shippori Mincho B1',serif;font-size:15px;line-height:1.9;color:var(--ink);font-weight:600;letter-spacing:.04em;}
.retry-btn{width:100%;padding:16px;background:transparent;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:12px;letter-spacing:.18em;color:var(--ink-soft);cursor:pointer;transition:border-color .2s,color .2s;}
.retry-btn:hover{border-color:var(--petal);color:var(--ink);}
.footer{text-align:center;padding-top:48px;border-top:1px solid var(--border);margin-top:48px;}
.footer-note{font-size:10px;color:var(--ink-pale);line-height:2.2;letter-spacing:.05em;}
.error-msg{background:#fff0f3;border:1px solid #f5c6cb;border-radius:4px;padding:16px 20px;font-size:13px;color:#842029;margin-top:16px;display:none;line-height:1.8;}
@media(max-width:480px){.page{padding:0 16px 60px;}.header{padding:40px 0 36px;}.fortune-block,.catchcopy-block,.action-block{padding:24px 20px;}}
</style>
</head>
<body>
<div class="page">

<header class="header">
  <div class="header-eyebrow">Daily Horoscope</div>
  <h1 class="header-title">今日の星が、<br><em>あなたに語りかける。</em></h1>
  <p class="header-desc">生年月日を入力するだけで<br>今日という一日を心地よくサバイブするための<br>ピンポイント星占いをお届けします</p>
</header>

<div class="form-section">
  <div class="form-label-row">
    <span class="form-label">ニックネーム</span>
    <span class="form-label-sub">表示用のみ・保存しません</span>
  </div>
  <input class="form-input" type="text" id="nameInput" placeholder="はな" />
</div>

<div class="form-section">
  <div class="form-label-row">
    <span class="form-label">生年月日</span>
    <span class="form-label-sub">星座・数秘術ナンバーの算出に使用</span>
  </div>
  <input class="form-input" type="date" id="dobInput" />
  <p class="form-note">※生年月日は鑑定のみに使用し、保存・記録はしません。</p>
</div>

<div class="cta-wrap">
  <button class="cta-btn" id="fortuneBtn" onclick="startFortune()">星に問いかける</button>
</div>
<div class="error-msg" id="errorMsg"></div>

<div class="loading" id="loading">
  <span class="loading-symbol">✦</span>
  <div class="loading-text">星の声を聴いています</div>
</div>

<div class="result" id="result">
  <div class="result-header">
    <div class="result-date" id="resDate"></div>
    <div class="result-sign-row">
      <span class="result-sign-symbol" id="resSymbol"></span>
      <span class="result-sign-name" id="resSignName"></span>
    </div>
    <div class="result-person" id="resPerson"></div>
  </div>
  <div class="catchcopy-block">
    <div class="catchcopy-label">Today's Message</div>
    <div class="catchcopy-text" id="resCatchcopy"></div>
  </div>
  <div class="fortune-block">
    <div class="fortune-label">Your Fortune Today</div>
    <div class="fortune-text" id="resFortune"></div>
  </div>
  <div class="action-block">
    <div class="action-label">One Action for Today</div>
    <div class="action-text" id="resAction"></div>
  </div>
  <button class="retry-btn" onclick="resetForm()">もう一度占う</button>
</div>

<footer class="footer">
  <p class="footer-note">本コンテンツはエンターテインメントを目的としています。<br>重要なご判断は専門家にご相談ください。</p>
</footer>
</div>

<script>
const zodiacList=[
  {name:'山羊座',symbol:'♑',sm:12,sd:22,em:12,ed:31},
  {name:'山羊座',symbol:'♑',sm:1,sd:1,em:1,ed:19},
  {name:'水瓶座',symbol:'♒',sm:1,sd:20,em:2,ed:18},
  {name:'魚座',symbol:'♓',sm:2,sd:19,em:3,ed:20},
  {name:'牡羊座',symbol:'♈',sm:3,sd:21,em:4,ed:19},
  {name:'牡牛座',symbol:'♉',sm:4,sd:20,em:5,ed:20},
  {name:'双子座',symbol:'♊',sm:5,sd:21,em:6,ed:21},
  {name:'蟹座',symbol:'♋',sm:6,sd:22,em:7,ed:22},
  {name:'獅子座',symbol:'♌',sm:7,sd:23,em:8,ed:22},
  {name:'乙女座',symbol:'♍',sm:8,sd:23,em:9,ed:22},
  {name:'天秤座',symbol:'♎',sm:9,sd:23,em:10,ed:23},
  {name:'蠍座',symbol:'♏',sm:10,sd:24,em:11,ed:22},
  {name:'射手座',symbol:'♐',sm:11,sd:23,em:12,ed:21},
];

function getZodiac(m,d){
  for(const z of zodiacList){
    if((m===z.sm&&d>=z.sd)||(m===z.em&&d<=z.ed))return z;
  }
  return zodiacList[0];
}

function getLifeNumber(y,m,d){
  let s=[...String(y),...String(m),...String(d)].reduce((a,c)=>a+parseInt(c),0);
  while(s>9&&s!==11&&s!==22)s=[...String(s)].reduce((a,c)=>a+parseInt(c),0);
  return s;
}

function todayJP(){
  const t=new Date();
  const wd=['日','月','火','水','木','金','土'];
  return `${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日（${wd[t.getDay()]}）`;
}

function showError(msg){
  const el=document.getElementById('errorMsg');
  el.textContent=msg;
  el.style.display='block';
}

async function startFortune(){
  const name=document.getElementById('nameInput').value.trim();
  const dob=document.getElementById('dobInput').value;
  document.getElementById('errorMsg').style.display='none';
  if(!name){alert('ニックネームをご入力ください');return;}
  if(!dob){alert('生年月日をご入力ください');return;}

  document.getElementById('result').style.display='none';
  document.getElementById('loading').style.display='block';
  document.getElementById('fortuneBtn').disabled=true;
  window.scrollTo({top:document.getElementById('loading').offsetTop-40,behavior:'smooth'});

  const [y,m,d]=dob.split('-').map(Number);
  const zodiac=getZodiac(m,d);
  const lifeNum=getLifeNumber(y,m,d);
  const today=new Date();
  const todayStr=`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

  try{
    const res=await fetch('https://uranai-worker.suukii01.workers.dev/',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        name,
        zodiac: zodiac.name,
        zodiacSymbol: zodiac.symbol,
        lifeNum,
        birthYear: y,
        birthMonth: m,
        birthDay: d,
        todayStr
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error||`HTTP ${res.status}`);
    }

    const f=await res.json();

    document.getElementById('resDate').textContent=todayJP();
    document.getElementById('resSymbol').textContent=zodiac.symbol;
    document.getElementById('resSignName').textContent=zodiac.name;
    document.getElementById('resPerson').textContent=name+' さんへ';
    document.getElementById('resCatchcopy').textContent=f.catchcopy;
    document.getElementById('resFortune').textContent=f.fortune;
    document.getElementById('resAction').textContent=f.action;

    document.getElementById('loading').style.display='none';
    document.getElementById('result').style.display='block';
    setTimeout(()=>window.scrollTo({top:document.getElementById('result').offsetTop-20,behavior:'smooth'}),100);

  }catch(e){
    document.getElementById('loading').style.display='none';
    showError('鑑定中にエラーが発生しました。しばらくしてからもう一度お試しください。');
    console.error(e);
  }
  document.getElementById('fortuneBtn').disabled=false;
}

function resetForm(){
  document.getElementById('result').style.display='none';
  document.getElementById('nameInput').value='';
  document.getElementById('dobInput').value='';
  document.getElementById('errorMsg').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
