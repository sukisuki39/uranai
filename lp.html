<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>SUKI Astrology | 星詠み鑑定</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#1a1218;color:#fdf8f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;overflow:hidden;}
.cosmos-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.cosmos-bg svg{width:100%;height:100%;opacity:0.12;}
.page{position:relative;z-index:1;max-width:480px;width:100%;text-align:center;}
.suki-img{width:180px;height:180px;object-fit:cover;object-position:top;border-radius:50%;margin-bottom:24px;box-shadow:0 8px 40px rgba(184,147,74,.3);border:3px solid rgba(184,147,74,.4);}
.eyebrow{font-size:10px;letter-spacing:.4em;color:#b8934a;margin-bottom:12px;text-transform:uppercase;}
.title{font-family:'Shippori Mincho B1',serif;font-size:clamp(28px,7vw,42px);font-weight:800;line-height:1.2;margin-bottom:8px;}
.title em{font-style:normal;color:#b8934a;}
.subtitle{font-size:12px;color:#b09aa8;letter-spacing:.1em;margin-bottom:40px;line-height:2;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;}
.lang-btn{display:block;padding:20px 16px;border-radius:8px;text-decoration:none;transition:all .3s;border:1px solid rgba(184,147,74,.3);}
.lang-btn-ja{background:rgba(184,147,74,.1);}
.lang-btn-en{background:rgba(212,160,181,.1);border-color:rgba(212,160,181,.3);}
.lang-btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3);}
.lang-flag{font-size:28px;display:block;margin-bottom:8px;}
.lang-label{font-size:10px;letter-spacing:.2em;color:#b09aa8;display:block;margin-bottom:4px;}
.lang-title{font-family:'Shippori Mincho B1',serif;font-size:16px;color:#fdf8f5;display:block;margin-bottom:4px;}
.lang-price{font-size:12px;color:#b8934a;display:block;}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(184,147,74,.2);}
.divider span{font-size:10px;color:#b09aa8;letter-spacing:.2em;}
.suki-note{font-size:11px;color:#7a6070;line-height:1.8;}
.suki-note strong{color:#b8934a;}
</style>
</head>
<body>

<div class="cosmos-bg">
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <circle cx="400" cy="300" r="30" fill="none" stroke="#b8934a" stroke-width="1"/>
  <circle cx="400" cy="300" r="5" fill="#b8934a"/>
  <ellipse cx="400" cy="300" rx="70" ry="45" fill="none" stroke="#b8934a" stroke-width="0.6" stroke-dasharray="4 3"/>
  <ellipse cx="400" cy="300" rx="120" ry="80" fill="none" stroke="#b8934a" stroke-width="0.5" stroke-dasharray="6 4"/>
  <ellipse cx="400" cy="300" rx="180" ry="120" fill="none" stroke="#b8934a" stroke-width="0.5"/>
  <ellipse cx="400" cy="300" rx="250" ry="166" fill="none" stroke="#b8934a" stroke-width="0.4" stroke-dasharray="8 5"/>
  <ellipse cx="400" cy="300" rx="330" ry="220" fill="none" stroke="#b8934a" stroke-width="0.4" stroke-dasharray="10 6"/>
  <circle cx="150" cy="280" r="1.5" fill="#b8934a"/>
  <circle cx="650" cy="200" r="1" fill="#b8934a"/>
  <circle cx="100" cy="450" r="1.2" fill="#b8934a"/>
  <circle cx="700" cy="420" r="1" fill="#b8934a"/>
</svg>
</div>

<div class="page">
  <img src="suki-icon.png" alt="SUKI" class="suki-img" />
  <div class="eyebrow">Astrologer</div>
  <h1 class="title">SUKI<br><em>Astrology</em></h1>
  <p class="subtitle">
    今この瞬間、星があなたに語りかけています。<br>
    The stars have something to say to you, right now.
  </p>

  <div class="lang-grid">
    <a href="https://buy.stripe.com/cNi8wQf017X74HS8uQ8og04" class="lang-btn lang-btn-ja">
      <span class="lang-flag">🇯🇵</span>
      <span class="lang-label">JAPANESE</span>
      <span class="lang-title">星詠み鑑定</span>
      <span class="lang-price">¥300</span>
    </a>
    <a href="https://buy.stripe.com/3cI3cw8BDfpzgqA26s8og03" class="lang-btn lang-btn-en">
      <span class="lang-flag">🌍</span>
      <span class="lang-label">ENGLISH</span>
      <span class="lang-title">Daily Reading</span>
      <span class="lang-price">$2.99</span>
    </a>
  </div>

  <div class="divider"><span>✦</span></div>

  <p class="suki-note">
    <strong>SUKI</strong> · Astrologer & Life Guide<br>
    AI-powered personal astrology readings<br>
    delivered to your inbox in minutes.
  </p>
</div>

</body>
</html>
